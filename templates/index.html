<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <meta name="color-scheme" content="light" />

  <title>Поймайка — админ-панель</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #fff8f4;
      --card: #ffffff;
      --card-soft: #fff0eb;
      --text: #261c19;
      --muted: #8d7770;
      --border: #f0ddd5;

      --pink: #ff668b;
      --pink-dark: #ec4770;
      --pink-soft: #ffe3eb;

      --orange: #f59b3a;
      --orange-soft: #fff0dc;

      --blue: #4088f4;
      --blue-soft: #e7f0ff;

      --purple: #9661c8;
      --purple-soft: #f2e8ff;

      --green: #249c6b;
      --green-soft: #e2f7ed;

      --danger: #e95757;
      --danger-soft: #ffe8e8;

      --shadow: 0 16px 45px rgba(87, 50, 37, 0.10);
      --radius-large: 26px;
      --radius-medium: 18px;
      --radius-small: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;

      color: var(--text);

      background:
        radial-gradient(
          circle at top right,
          rgba(255, 102, 139, 0.17),
          transparent 420px
        ),
        radial-gradient(
          circle at bottom left,
          rgba(245, 155, 58, 0.14),
          transparent 400px
        ),
        var(--bg);

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      padding:
        max(16px, env(safe-area-inset-top))
        14px
        max(28px, env(safe-area-inset-bottom));
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;

      display: grid;
      place-items: center;

      border-radius: 18px;

      background: linear-gradient(145deg, #ff8ca7, #ff557e);

      box-shadow:
        0 12px 25px rgba(255, 85, 126, 0.28);

      font-size: 27px;
      transform: rotate(-3deg);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      margin: 0;

      font-size: clamp(21px, 5vw, 30px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand-text p {
      margin: 6px 0 0;

      color: var(--muted);

      font-size: 12px;
      line-height: 1.35;
    }

    .admin-badge {
      flex: 0 0 auto;

      padding: 9px 12px;

      border: 1px solid rgba(255, 102, 139, 0.28);
      border-radius: 999px;

      color: var(--pink-dark);
      background: rgba(255, 255, 255, 0.78);

      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;

      margin-bottom: 14px;
    }

    .stat-card {
      position: relative;
      overflow: hidden;

      min-height: 112px;
      padding: 17px;

      border: 1px solid rgba(240, 221, 213, 0.92);
      border-radius: 22px;

      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 8px 25px rgba(87, 50, 37, 0.06);

      backdrop-filter: blur(12px);
    }

    .stat-card::after {
      content: "";

      position: absolute;
      right: -28px;
      bottom: -34px;

      width: 95px;
      height: 95px;

      border-radius: 50%;

      background: var(--bubble-color);
    }

    .stat-label {
      position: relative;
      z-index: 1;

      display: block;

      color: var(--muted);

      font-size: 11px;
      font-weight: 800;
    }

    .stat-value {
      position: relative;
      z-index: 1;

      display: block;

      margin-top: 11px;

      font-size: 31px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .stat-description {
      position: relative;
      z-index: 1;

      display: block;

      margin-top: 9px;

      color: var(--muted);

      font-size: 10px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 180px 180px auto;
      gap: 9px;

      margin-bottom: 14px;
      padding: 11px;

      border: 1px solid var(--border);
      border-radius: 21px;

      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 10px 28px rgba(87, 50, 37, 0.06);

      backdrop-filter: blur(14px);
    }

    .control {
      width: 100%;
      min-height: 46px;

      padding: 0 14px;

      border: 1px solid var(--border);
      border-radius: var(--radius-small);
      outline: none;

      color: var(--text);
      background: #ffffff;

      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .control:focus {
      border-color: rgba(255, 102, 139, 0.7);
      box-shadow: 0 0 0 4px rgba(255, 102, 139, 0.11);
    }

    .refresh-button {
      min-height: 46px;

      padding: 0 17px;

      border-radius: var(--radius-small);

      color: #ffffff;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));

      box-shadow: 0 8px 18px rgba(236, 71, 112, 0.22);

      font-weight: 850;
      cursor: pointer;
    }

    .refresh-button:active {
      transform: translateY(1px);
    }

    .refresh-button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 14px;
      align-items: start;
    }

    .list-panel,
    .details-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius-large);

      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);

      backdrop-filter: blur(16px);
    }

    .list-panel {
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;

      padding: 18px 18px 13px;
    }

    .panel-title {
      margin: 0;

      font-size: 17px;
      letter-spacing: -0.025em;
    }

    .result-count {
      color: var(--muted);

      font-size: 11px;
      font-weight: 800;
    }

    .request-list {
      display: grid;
      gap: 9px;

      padding: 0 10px 10px;
    }

    .request-card {
      width: 100%;

      padding: 15px;

      border: 1px solid transparent;
      border-radius: 18px;

      color: inherit;
      background: transparent;

      text-align: left;
      cursor: pointer;

      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        transform 0.18s ease;
    }

    .request-card:hover {
      background: var(--card-soft);
    }

    .request-card.active {
      border-color: rgba(255, 102, 139, 0.31);

      background:
        linear-gradient(145deg, #fff5f8, #fffaf7);

      transform: translateX(2px);
    }

    .request-top,
    .request-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .request-id {
      color: var(--muted);

      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.055em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;

      padding: 7px 10px;

      border-radius: 999px;

      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status::before {
      content: "";

      width: 6px;
      height: 6px;

      border-radius: 50%;

      background: currentColor;
    }

    .status-new {
      color: #d17415;
      background: var(--orange-soft);
    }

    .status-in_progress {
      color: #3478de;
      background: var(--blue-soft);
    }

    .status-waiting {
      color: #8d50bd;
      background: var(--purple-soft);
    }

    .status-resolved {
      color: #168456;
      background: var(--green-soft);
    }

    .request-card h3 {
      margin: 12px 0 5px;

      font-size: 15px;
      line-height: 1.3;
    }

    .request-preview {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;

      margin: 0 0 13px;

      color: var(--muted);

      font-size: 12px;
      line-height: 1.45;
    }

    .request-meta {
      color: var(--muted);

      font-size: 10px;
      line-height: 1.3;
    }

    .request-machine {
      min-width: 0;
      overflow: hidden;

      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .details-panel {
      position: sticky;
      top: max(16px, env(safe-area-inset-top));

      min-height: 500px;
      padding: 20px;
    }

    .empty-state,
    .error-state {
      min-height: 300px;

      display: grid;
      place-items: center;

      padding: 28px;

      color: var(--muted);

      text-align: center;
    }

    .empty-icon {
      width: 72px;
      height: 72px;

      display: grid;
      place-items: center;

      margin: 0 auto 14px;

      border-radius: 24px;

      background: var(--card-soft);

      font-size: 31px;
    }

    .empty-state h3,
    .error-state h3 {
      margin: 0 0 7px;

      color: var(--text);

      font-size: 16px;
    }

    .empty-state p,
    .error-state p {
      max-width: 280px;

      margin: 0 auto;

      font-size: 12px;
      line-height: 1.5;
    }

    .details-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;

      margin-bottom: 17px;
    }

    .details-header h2 {
      margin: 5px 0 0;

      font-size: 21px;
      line-height: 1.15;
      letter-spacing: -0.035em;
    }

    .close-details {
      display: none;

      width: 38px;
      height: 38px;

      border-radius: 12px;

      color: var(--muted);
      background: var(--card-soft);

      font-size: 20px;
      cursor: pointer;
    }

    .details-section {
      padding: 15px 0;

      border-top: 1px solid var(--border);
    }

    .details-section:first-of-type {
      border-top: 0;
    }

    .section-title {
      margin: 0 0 10px;

      color: var(--muted);

      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .message-box {
      padding: 14px;

      border-radius: 16px;

      background: var(--card-soft);

      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .request-photo {
      width: 100%;
      max-height: 360px;
      display: block;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
    }

    .info-list {
      display: grid;
      gap: 11px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 12px;

      align-items: start;

      font-size: 12px;
    }

    .info-name {
      color: var(--muted);
    }

    .info-value {
      font-weight: 750;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .info-value a {
      color: var(--pink-dark);
      text-decoration: none;
    }

    .status-editor {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
    }

    .save-button {
      min-width: 100px;

      padding: 0 15px;

      border-radius: 14px;

      color: #ffffff;
      background: var(--text);

      font-weight: 850;
      cursor: pointer;
    }

    .save-button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .skeleton-list {
      display: grid;
      gap: 9px;

      padding: 0 10px 10px;
    }

    .skeleton {
      height: 126px;

      border-radius: 18px;

      background:
        linear-gradient(
          90deg,
          #f8eee9 25%,
          #fff8f4 37%,
          #f8eee9 63%
        );

      background-size: 400% 100%;

      animation: shimmer 1.25s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: 0 0;
      }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom));
      z-index: 100;

      max-width: calc(100% - 32px);

      padding: 12px 16px;

      border-radius: 14px;

      color: #ffffff;
      background: rgba(38, 28, 25, 0.95);

      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);

      font-size: 12px;
      font-weight: 850;
      text-align: center;

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 12px);

      transition:
        opacity 0.2s ease,
        transform 0.2s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 920px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .search-control {
        grid-column: 1 / -1;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .details-panel {
        position: fixed;
        inset: 0;
        z-index: 50;

        min-height: 100dvh;

        overflow-y: auto;

        border: 0;
        border-radius: 0;

        padding:
          max(22px, env(safe-area-inset-top))
          18px
          max(28px, env(safe-area-inset-bottom));

        transform: translateY(105%);

        transition: transform 0.25s ease;
      }

      .details-panel.open {
        transform: translateY(0);
      }

      .close-details {
        display: inline-grid;
        place-items: center;
      }
    }

    @media (max-width: 560px) {
      body {
        padding-left: 11px;
        padding-right: 11px;
      }

      .header {
        align-items: flex-start;
      }

      .logo {
        width: 46px;
        height: 46px;

        border-radius: 16px;
      }

      .admin-badge {
        padding: 8px 9px;

        font-size: 9px;
      }

      .stats {
        gap: 8px;
      }

      .stat-card {
        min-height: 104px;
        padding: 15px;
      }

      .stat-value {
        font-size: 27px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .search-control {
        grid-column: auto;
      }

      .refresh-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">🧸</div>

        <div class="brand-text">
          <h1>Поймайка</h1>
          <p>Админ-панель заявок поддержки</p>
        </div>
      </div>

      <div class="admin-badge">ADMIN</div>
    </header>

    <section class="stats">
      <article
        class="stat-card"
        style="--bubble-color: var(--orange-soft)"
      >
        <span class="stat-label">Новые</span>
        <strong id="stat-new" class="stat-value">0</strong>
        <span class="stat-description">ждут ответа</span>
      </article>

      <article
        class="stat-card"
        style="--bubble-color: var(--blue-soft)"
      >
        <span class="stat-label">В работе</span>
        <strong id="stat-progress" class="stat-value">0</strong>
        <span class="stat-description">обрабатываются</span>
      </article>

      <article
        class="stat-card"
        style="--bubble-color: var(--purple-soft)"
      >
        <span class="stat-label">Ожидание</span>
        <strong id="stat-waiting" class="stat-value">0</strong>
        <span class="stat-description">нужен ответ</span>
      </article>

      <article
        class="stat-card"
        style="--bubble-color: var(--green-soft)"
      >
        <span class="stat-label">Решено</span>
        <strong id="stat-resolved" class="stat-value">0</strong>
        <span class="stat-description">закрытые заявки</span>
      </article>
    </section>

    <section class="toolbar">
      <input
        id="search"
        class="control search-control"
        type="search"
        placeholder="Поиск по проблеме, имени или автомату..."
        autocomplete="off"
      />

      <select id="status-filter" class="control">
        <option value="all">Все статусы</option>
        <option value="new">Новые</option>
        <option value="in_progress">В работе</option>
        <option value="waiting">Ожидание</option>
        <option value="resolved">Решено</option>
      </select>

      <select id="sort-filter" class="control">
        <option value="newest">Сначала новые</option>
        <option value="oldest">Сначала старые</option>
      </select>

      <button
        id="refresh-button"
        class="refresh-button"
        type="button"
      >
        Обновить
      </button>
    </section>

    <section class="content">
      <div class="list-panel">
        <div class="panel-header">
          <h2 class="panel-title">Заявки</h2>
          <span id="result-count" class="result-count">
            0 заявок
          </span>
        </div>

        <div id="request-list"></div>
      </div>

      <aside
        id="details-panel"
        class="details-panel"
      >
        <div class="empty-state">
          <div>
            <div class="empty-icon">📨</div>
            <h3>Выбери заявку</h3>
            <p>
              Здесь появится полная информация и управление статусом.
            </p>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const tg = window.Telegram?.WebApp;

    /*
      HTML ожидает такие маршруты:

      GET /api/admin/requests

      PATCH /api/admin/requests/{request_id}

      PATCH принимает JSON:

      {
        "status": "in_progress"
      }
    */

    const API_URL = "/api/admin/requests";

    const state = {
      requests: [],
      selectedId: null,
      loading: false
    };

    const statusConfig = {
      new: {
        label: "Новая",
        className: "status-new"
      },

      in_progress: {
        label: "В работе",
        className: "status-in_progress"
      },

      waiting: {
        label: "Ожидание",
        className: "status-waiting"
      },

      resolved: {
        label: "Решено",
        className: "status-resolved"
      }
    };

    const elements = {
      requestList: document.getElementById("request-list"),
      detailsPanel: document.getElementById("details-panel"),

      resultCount: document.getElementById("result-count"),

      search: document.getElementById("search"),
      statusFilter: document.getElementById("status-filter"),
      sortFilter: document.getElementById("sort-filter"),

      refreshButton: document.getElementById("refresh-button"),

      statNew: document.getElementById("stat-new"),
      statProgress: document.getElementById("stat-progress"),
      statWaiting: document.getElementById("stat-waiting"),
      statResolved: document.getElementById("stat-resolved"),

      toast: document.getElementById("toast")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function apiHeaders(withJson = false) {
      const headers = {
        "X-Telegram-Init-Data": tg?.initData || ""
      };

      if (withJson) {
        headers["Content-Type"] = "application/json";
      }

      return headers;
    }

    function normalizeRequest(item) {
      return {
        id: item.id,

        user_id:
          item.user_id ??
          "",

        username:
          item.username ??
          "",

        full_name:
          item.full_name ??
          "Без имени",

        machine_info:
          item.machine_info ??
          "Автомат не указан",

        problem:
          item.problem ??
          "Проблема не указана",

        table_error:
          item.table_error ??
          "Не указано",

        amount:
          item.amount ??
          "Не указано",

        requisites:
          item.requisites ??
          "Не указано",

        photo_url:
          item.photo_file_id
            ? `/api/admin/requests/${encodeURIComponent(item.id)}/photo`
            : "",

        status:
          statusConfig[item.status]
            ? item.status
            : "new",

        created_at:
          item.created_at ??
          ""
      };
    }

    function formatDate(value) {
      if (!value) {
        return "Дата не указана";
      }

      const normalized = value.includes("T")
        ? value
        : value.replace(" ", "T");

      const date = new Date(normalized);

      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat("ru-RU", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function pluralizeRequests(number) {
      const mod10 = number % 10;
      const mod100 = number % 100;

      if (mod10 === 1 && mod100 !== 11) {
        return `${number} заявка`;
      }

      if (
        [2, 3, 4].includes(mod10) &&
        ![12, 13, 14].includes(mod100)
      ) {
        return `${number} заявки`;
      }

      return `${number} заявок`;
    }

    function showToast(message) {
      elements.toast.textContent = message;
      elements.toast.classList.add("visible");

      clearTimeout(showToast.timeout);

      showToast.timeout = setTimeout(() => {
        elements.toast.classList.remove("visible");
      }, 2300);
    }

    function renderSkeletons() {
      elements.requestList.innerHTML = `
        <div class="skeleton-list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      `;
    }

    function getFilteredRequests() {
      const query = elements.search.value
        .trim()
        .toLowerCase();

      const selectedStatus =
        elements.statusFilter.value;

      const selectedSort =
        elements.sortFilter.value;

      return state.requests
        .filter((request) => {
          const searchableText = [
            request.id,
            request.user_id,
            request.username,
            request.full_name,
            request.machine_info,
            request.problem,
            request.table_error,
            request.amount,
            request.requisites
          ]
            .join(" ")
            .toLowerCase();

          const matchesSearch =
            !query ||
            searchableText.includes(query);

          const matchesStatus =
            selectedStatus === "all" ||
            request.status === selectedStatus;

          return matchesSearch && matchesStatus;
        })
        .sort((first, second) => {
          const firstTime =
            new Date(
              String(first.created_at).replace(" ", "T")
            ).getTime() || 0;

          const secondTime =
            new Date(
              String(second.created_at).replace(" ", "T")
            ).getTime() || 0;

          return selectedSort === "oldest"
            ? firstTime - secondTime
            : secondTime - firstTime;
        });
    }

    function updateStatistics() {
      const countByStatus = (status) =>
        state.requests.filter(
          (request) => request.status === status
        ).length;

      elements.statNew.textContent =
        countByStatus("new");

      elements.statProgress.textContent =
        countByStatus("in_progress");

      elements.statWaiting.textContent =
        countByStatus("waiting");

      elements.statResolved.textContent =
        countByStatus("resolved");
    }

    function renderRequests() {
      const requests = getFilteredRequests();

      elements.resultCount.textContent =
        pluralizeRequests(requests.length);

      if (!requests.length) {
        elements.requestList.innerHTML = `
          <div class="empty-state">
            <div>
              <div class="empty-icon">🔎</div>
              <h3>Заявки не найдены</h3>
              <p>
                Попробуй изменить поиск или выбранный статус.
              </p>
            </div>
          </div>
        `;

        return;
      }

      elements.requestList.innerHTML = `
        <div class="request-list">
          ${requests.map((request) => {
            const status =
              statusConfig[request.status];

            return `
              <button
                class="
                  request-card
                  ${
                    String(state.selectedId) ===
                    String(request.id)
                      ? "active"
                      : ""
                  }
                "
                data-request-id="${escapeHtml(request.id)}"
                type="button"
              >
                <div class="request-top">
                  <span class="request-id">
                    ЗАЯВКА #${escapeHtml(request.id)}
                  </span>

                  <span class="status ${status.className}">
                    ${status.label}
                  </span>
                </div>

                <h3>
                  ${escapeHtml(request.problem)}
                </h3>

                <p class="request-preview">
                  ${escapeHtml(request.machine_info)}
                </p>

                <div class="request-bottom">
                  <span class="request-meta request-machine">
                    ${
                      request.full_name
                        ? escapeHtml(request.full_name)
                        : "Без имени"
                    }
                  </span>

                  <span class="request-meta">
                    ${escapeHtml(
                      formatDate(request.created_at)
                    )}
                  </span>
                </div>
              </button>
            `;
          }).join("")}
        </div>
      `;

      elements.requestList
        .querySelectorAll("[data-request-id]")
        .forEach((button) => {
          button.addEventListener("click", () => {
            const requestId =
              button.dataset.requestId;

            const request =
              state.requests.find(
                (item) =>
                  String(item.id) ===
                  String(requestId)
              );

            if (!request) {
              return;
            }

            state.selectedId = request.id;

            renderRequests();
            renderDetails(request);

            tg?.HapticFeedback?.selectionChanged();
          });
        });
    }

    function renderDetails(request) {
      const status =
        statusConfig[request.status];

      const cleanUsername =
        String(request.username || "")
          .replace(/^@/, "");

      elements.detailsPanel.innerHTML = `
        <div class="details-header">
          <div>
            <span class="request-id">
              ЗАЯВКА #${escapeHtml(request.id)}
            </span>

            <h2>
              ${escapeHtml(request.problem)}
            </h2>
          </div>

          <button
            id="close-details"
            class="close-details"
            type="button"
            aria-label="Закрыть"
          >
            ×
          </button>
        </div>

        <span class="status ${status.className}">
          ${status.label}
        </span>

        <section class="details-section">
          <p class="section-title">
            Информация об автомате
          </p>

          <div class="message-box">
            ${escapeHtml(request.machine_info)}
          </div>
        </section>

        <section class="details-section">
          <p class="section-title">
            Данные заявки
          </p>

          <div class="info-list">
            <div class="info-row">
              <span class="info-name">
                Клиент
              </span>

              <span class="info-value">
                ${escapeHtml(request.full_name)}
              </span>
            </div>

            <div class="info-row">
              <span class="info-name">
                Telegram
              </span>

              <span class="info-value">
                ${
                  cleanUsername
                    ? `
                      <a
                        href="https://t.me/${encodeURIComponent(cleanUsername)}"
                        target="_blank"
                      >
                        @${escapeHtml(cleanUsername)}
                      </a>
                    `
                    : "Username не указан"
                }
              </span>
            </div>

            <div class="info-row">
              <span class="info-name">
                Telegram ID
              </span>

              <span class="info-value">
                ${escapeHtml(
                  request.user_id || "Не указан"
                )}
              </span>
            </div>

            <div class="info-row">
              <span class="info-name">
                Ошибка табло
              </span>

              <span class="info-value">
                ${escapeHtml(request.table_error)}
              </span>
            </div>

            <div class="info-row">
              <span class="info-name">
                Сумма
              </span>

              <span class="info-value">
                ${escapeHtml(request.amount)}
              </span>
            </div>

            <div class="info-row">
              <span class="info-name">
                Создана
              </span>

              <span class="info-value">
                ${escapeHtml(
                  formatDate(request.created_at)
                )}
              </span>
            </div>
          </div>
        </section>

        <section class="details-section">
          <p class="section-title">
            Возврат денег
          </p>

          <div class="message-box">
            ${escapeHtml(request.requisites)}
          </div>
        </section>

        ${
          request.photo_url
            ? `
              <section class="details-section">
                <p class="section-title">
                  Фото от клиента
                </p>

                <img
                  class="request-photo"
                  src="${request.photo_url}"
                  alt="Фото по заявке"
                  loading="lazy"
                />
              </section>
            `
            : ""
        }

        <section class="details-section">
          <p class="section-title">
            Изменить статус
          </p>

          <div class="status-editor">
            <select
              id="details-status"
              class="control"
            >
              ${Object.entries(statusConfig)
                .map(([value, config]) => `
                  <option
                    value="${value}"
                    ${
                      value === request.status
                        ? "selected"
                        : ""
                    }
                  >
                    ${config.label}
                  </option>
                `)
                .join("")}
            </select>

            <button
              id="save-status"
              class="save-button"
              type="button"
            >
              Сохранить
            </button>
          </div>
        </section>
      `;

      elements.detailsPanel.classList.add("open");

      document
        .getElementById("close-details")
        ?.addEventListener(
          "click",
          closeDetails
        );

      document
        .getElementById("save-status")
        ?.addEventListener(
          "click",
          async () => {
            const select =
              document.getElementById(
                "details-status"
              );

            await updateRequestStatus(
              request.id,
              select.value
            );
          }
        );
    }

    function closeDetails() {
      elements.detailsPanel.classList.remove("open");

      if (window.innerWidth <= 920) {
        state.selectedId = null;
        renderRequests();
      }
    }

    async function loadRequests() {
      if (state.loading) {
        return;
      }

      state.loading = true;

      elements.refreshButton.disabled = true;
      elements.refreshButton.textContent =
        "Загрузка...";

      renderSkeletons();

      try {
        const response = await fetch(API_URL, {
          method: "GET",
          headers: apiHeaders()
        });

        if (
          response.status === 401 ||
          response.status === 403
        ) {
          throw new Error(
            "У вас нет доступа к админ-панели"
          );
        }

        if (!response.ok) {
          throw new Error(
            `Ошибка сервера: ${response.status}`
          );
        }

        const data = await response.json();

        const rawRequests =
          Array.isArray(data)
            ? data
            : data.requests || [];

        state.requests =
          rawRequests.map(normalizeRequest);

        updateStatistics();
        renderRequests();

        if (state.selectedId !== null) {
          const selectedRequest =
            state.requests.find(
              (request) =>
                String(request.id) ===
                String(state.selectedId)
            );

          if (selectedRequest) {
            renderDetails(selectedRequest);
          }
        }
      } catch (error) {
        console.error(error);

        elements.requestList.innerHTML = `
          <div class="error-state">
            <div>
              <div class="empty-icon">⚠️</div>
              <h3>Не удалось загрузить заявки</h3>
              <p>
                ${escapeHtml(error.message)}
              </p>
            </div>
          </div>
        `;

        showToast(error.message);
      } finally {
        state.loading = false;

        elements.refreshButton.disabled = false;
        elements.refreshButton.textContent =
          "Обновить";
      }
    }

    async function updateRequestStatus(
      requestId,
      newStatus
    ) {
      const saveButton =
        document.getElementById("save-status");

      if (saveButton) {
        saveButton.disabled = true;
        saveButton.textContent = "...";
      }

      try {
        const response = await fetch(
          `${API_URL}/${encodeURIComponent(requestId)}`,
          {
            method: "PATCH",
            headers: apiHeaders(true),
            body: JSON.stringify({
              status: newStatus
            })
          }
        );

        if (
          response.status === 401 ||
          response.status === 403
        ) {
          throw new Error(
            "Нет прав для изменения заявки"
          );
        }

        if (!response.ok) {
          throw new Error(
            `Не удалось изменить статус: ${response.status}`
          );
        }

        const requestIndex =
          state.requests.findIndex(
            (request) =>
              String(request.id) ===
              String(requestId)
          );

        if (requestIndex !== -1) {
          state.requests[requestIndex] = {
            ...state.requests[requestIndex],
            status: newStatus
          };
        }

        updateStatistics();
        renderRequests();

        if (requestIndex !== -1) {
          renderDetails(
            state.requests[requestIndex]
          );
        }

        showToast(
          "Статус заявки обновлён"
        );

        tg?.HapticFeedback
          ?.notificationOccurred("success");
      } catch (error) {
        console.error(error);

        showToast(error.message);

        tg?.HapticFeedback
          ?.notificationOccurred("error");
      } finally {
        const currentButton =
          document.getElementById(
            "save-status"
          );

        if (currentButton) {
          currentButton.disabled = false;
          currentButton.textContent =
            "Сохранить";
        }
      }
    }

    function setupTelegram() {
      if (!tg) {
        return;
      }

      tg.ready();
      tg.expand();

      tg.setHeaderColor?.("#fff8f4");
      tg.setBackgroundColor?.("#fff8f4");

      tg.BackButton?.onClick(() => {
        if (
          elements.detailsPanel.classList
            .contains("open")
        ) {
          closeDetails();
        } else {
          tg.close();
        }
      });
    }

    elements.search.addEventListener(
      "input",
      renderRequests
    );

    elements.statusFilter.addEventListener(
      "change",
      renderRequests
    );

    elements.sortFilter.addEventListener(
      "change",
      renderRequests
    );

    elements.refreshButton.addEventListener(
      "click",
      loadRequests
    );

    setupTelegram();
    loadRequests();
  </script>
</body>
</html>
